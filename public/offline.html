<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>Offline — Project Nidus</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #111827;
        color: #e5e7eb;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .card {
        max-width: 28rem;
        width: 100%;
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 0.75rem;
        padding: 1.5rem;
        text-align: center;
      }
      .logo {
        width: 3rem;
        height: 3rem;
        margin: 0 auto 1rem;
        border-radius: 0.5rem;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { font-size: 0.875rem; color: #9ca3af; margin: 0 0 1rem; line-height: 1.5; }
      ul {
        text-align: left;
        font-size: 0.75rem;
        color: #9ca3af;
        margin: 0 0 1rem;
        padding-left: 1.25rem;
      }
      button {
        width: 100%;
        padding: 0.625rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: #fff;
        background: #2563eb;
        border: none;
        border-radius: 0.5rem;
        cursor: pointer;
      }
      button:hover { background: #1d4ed8; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo" aria-hidden="true"></div>
      <h1>You are offline</h1>
      <p>Project Nidus could not reach the network. Cached areas of the app may still work after you return online.</p>
      <p style="margin-bottom:0.5rem;font-size:0.75rem;color:#6b7280;">Try these when back online:</p>
      <ul>
        <li>Platform dashboard — <code style="color:#93c5fd;">/platform/dashboard</code></li>
        <li>Simulator — <code style="color:#93c5fd;">/simulator/dashboard</code></li>
      </ul>
      <button type="button" id="retry">Retry</button>
    </div>
    <script>
      document.getElementById('retry').addEventListener('click', function () {
        window.location.reload()
      })
      window.addEventListener('online', function () {
        window.location.reload()
      })
    </script>
  </body>
</html>
